# This is a basic workflow to help you get started with Actions

name: golangci-lint

# Controls when the workflow will run
on:
  pull_request:
    paths:
      - tencentcloud/**
      - .github/**
      - .golangci.yml

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  golangci-lint:
    # The type of runner that the job will run on
    runs-on: macos-latest
 
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      # Runs a set of commands using the runners shell
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          skip-cache: true
          # v1.64.8 is the last v1.x release and the first v1 line that fully
          # supports Go 1.25's export data format. Older versions (e.g. v1.54)
          # ship a go/types built against Go 1.20 and panic with
          # "could not import sync/atomic ... unsupported version: 2"
          # when analysing code compiled by Go 1.25.
          version: v1.64.8
          working-directory: ./tencentcloud
          args: --new-from-rev=origin/master -v
          #args: --enable-all --max-same-issues=0 --max-issues-per-linter=0 --new-from-rev=origin/master -v